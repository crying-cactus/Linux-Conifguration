[general]
working_directory = "~/"
import =[
	# "~/.config/alacritty/themes/themes/tokyo_night_enhanced.toml"
	#"~/.config/alacritty/themes/themes/cyber_punk_neon.toml"	
	#"~/.config/alacritty/themes/themes/remedy_dark.toml"
  "~/.config/alacritty/eclipse.toml"
]

[env]

[window]
title = "Alacritty"
dynamic_padding = false
# decorations = "Full"
opacity = 1.0
# decorations_theme_variant = "Dark"

[window.class]
general = "Alacritty"
instance = "Alacritty"

[scrolling]
history = 5000

[font]
size = 12

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.normal]
family = "JetBrainsMono"
style = "Regular"

[colors]

[bell]

[selection]

[cursor]

[terminal]

[mouse]

[hints]

[keyboard]
bindings = [
	# CLIPBOARD
	{ key = "V", mods = "Control", action = "Paste" },
	{ key = "C", mods = "Control", action = "Copy" }
]

[debug]


