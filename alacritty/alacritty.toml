[general]
working_directory = "~/"
import =[
	# "~/.config/alacritty/themes/themes/tokyo_night_enhanced.toml"
	#"~/.config/alacritty/themes/themes/cyber_punk_neon.toml"	
	#"~/.config/alacritty/themes/themes/remedy_dark.toml"
  "~/.config/alacritty/eclipse.toml"
]

[env]

[window]
decorations = "Full"
opacity = 0.6
blur = true
decorations_theme_variant = "Dark"
padding = { x = 20, y = 20  }

[scrolling]
history = 5000

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
size = 12

[colors]

[bell]

[selection]

[cursor]

[terminal]

[mouse]

[hints]

[keyboard]
bindings = [
	# CLIPBOARD
	{ key = "V", mods = "Super", action = "Paste" },
	{ key = "C", mods = "Super", action = "Copy" }
]

[debug]


